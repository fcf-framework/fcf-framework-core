<html>
  <head>
    <script src="/node_modules/fcf-framework-core/fcf.js"></script>
    <script>
      fcf.getContext().route.args.___fcf_unitest = 1;
    </script>
    <script src="/node_modules/fcf-framework-unitest/unitest.js"></script>
    <script src="/base-tests/functions/modules.js"></script>
    <script src="/base-tests/functions/parseStack.js"></script>
    <script src="/base-tests/functions/inlineExecution.js"></script>
    <script src="/base-tests/functions/t.js"></script>
    <script src="/base-tests/functions/modules/static_module.js"></script>
  </head>
  <body>
    <h1>UniTests</h1>
    <script>
    fcf.getEventChannel().on("unitest_message", (a_message)=>{
      document.getElementById("output").innerHTML += `[${fcf.pad(a_message.level, 7, " ", "c")}]: ${a_message.message}\n`;
    });
    function runTest(a_test) {
      document.getElementById("output").innerHTML = "";
      let tests = a_test ? [a_test] : false;
      fcf.NUnitest.unitest.run({ tests:  tests });
    }
    </script>
    <button onclick="runTest('Function fcf.path');">Run "Function fcf.path"</button>
    <button onclick="runTest('Functions fcf.module & fcf.require');">Run "Functions fcf.module & fcf.require"</button>
    <button onclick="runTest('Function fcf.parseStack');">Run "Function fcf.parseStack"</button>
    <p>
      <button onclick="runTest();">Run tests</button>
      <button onclick="document.getElementById('output').innerHTML = '';">Clear</button>
    </p>
    <fieldset>
      <legend>Output</legend>
      <pre id="output"></pre>
    </fieldset>
  </body>
</html>
